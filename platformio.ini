; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ── Flash / PSRAM (Waveshare ESP32-S3-Touch-LCD-3.5 ships with 16 MB flash + 8 MB OPI PSRAM)
board_upload.flash_size        = 16MB
board_build.arduino.memory_type = qio_opi

; ── TFT_eSPI: configure for the on-board ST7796 SPI display
;    All GPIO numbers come from the official Waveshare schematic
;    https://files.waveshare.com/wiki/ESP32-S3-Touch-LCD-3.5/ESP32-S3-Touch-LCD-3.5-Schematic.pdf
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    ; Tell TFT_eSPI that all settings are supplied here (skip User_Setup.h lookup)
    -D USER_SETUP_LOADED=1

    ; Display driver
    -D ST7796_DRIVER=1

    ; Portrait dimensions (driver native); rotation is applied in firmware
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480

    ; SPI pins (from schematic)
    -D TFT_MOSI=10
    -D TFT_SCLK=11
    -D TFT_MISO=12
    -D TFT_CS=13
    -D TFT_DC=15
    -D TFT_RST=17

    ; Backlight is handled by the AXP2101 PMIC (not a raw GPIO)
    -D TFT_BL=-1

    ; SPI clock speeds
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; Font support
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
